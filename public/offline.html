<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ऑफलाइन – Yojana Mitra</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans Devanagari', 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #faf6f1 0%, #fef3c7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 380px;
    }
    .icon {
      width: 80px; height: 80px; margin: 0 auto 24px;
      background: linear-gradient(135deg, #e07516, #d4910a);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(224, 117, 22, 0.3);
      animation: pulse 2s ease-in-out infinite;
    }
    .icon svg { width: 36px; height: 36px; color: white; }
    h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 8px; }
    .subtitle { font-size: 18px; color: #e07516; font-weight: 600; margin-bottom: 16px; }
    p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: linear-gradient(135deg, #e07516, #d4910a);
      color: white; border: none; padding: 12px 32px;
      border-radius: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; box-shadow: 0 4px 12px rgba(224, 117, 22, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:active { transform: scale(0.96); }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M2 12l2-2m0 0l2-2m-2 2l2 2m-2-2l-2-2" />
      </svg>
    </div>
    <div class="subtitle">ऑफलाइन</div>
    <h1>No Internet Connection</h1>
    <p>इंटरनेट कनेक्शन नहीं है। कृपया अपना कनेक्शन जांचें और पुनः प्रयास करें।</p>
    <p>Please check your connection and try again.</p>
    <button onclick="window.location.reload()">पुनः प्रयास करें / Retry</button>
  </div>
</body>
</html>
