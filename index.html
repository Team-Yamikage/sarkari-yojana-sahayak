    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #e07516, #d4910a);
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #splash-screen.hide {
        opacity: 0;
        visibility: hidden;
      }
      #splash-logo {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        background: rgba(255,255,255,0.9);
        padding: 4px;
        animation: splash-bounce 1.2s ease-in-out infinite;
        box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      }
      #splash-title {
        color: white;
        font-size: 22px;
        font-weight: 700;
        margin-top: 20px;
        opacity: 0;
        animation: splash-fade-up 0.6s 0.3s ease-out forwards;
        font-family: 'Noto Sans Devanagari', sans-serif;
      }
      #splash-subtitle {
        color: rgba(255,255,255,0.85);
        font-size: 13px;
        margin-top: 6px;
        opacity: 0;
        animation: splash-fade-up 0.6s 0.5s ease-out forwards;
        font-family: 'Inter', sans-serif;
      }
      #splash-loader {
        margin-top: 32px;
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
        opacity: 0;
        animation: splash-spin 0.8s linear infinite, splash-fade-up 0.4s 0.7s ease-out forwards;
      }
      #splash-dots {
        display: flex;
        gap: 8px;
        margin-top: 24px;
        opacity: 0;
        animation: splash-fade-up 0.4s 0.9s ease-out forwards;
      }
      #splash-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(255,255,255,0.5);
        animation: splash-dot-pulse 1.4s ease-in-out infinite;
      }
      #splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      #splash-dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes splash-bounce {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
      }
      @keyframes splash-fade-up {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes splash-dot-pulse {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.3); }
      }
    </style>
  </head>
  <body>
    <!-- Splash Screen -->
    <div id="splash-screen">
      <img id="splash-logo" src="/logo.png" alt="Logo" />
      <div id="splash-title">सरकारी योजना मित्र AI</div>
      <div id="splash-subtitle">Understand Your Government Schemes</div>
      <div id="splash-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
